layers:
  - name: working
    path: MEMORY.md
    max_lines: 200
    format: markdown
  - name: runtime
    path: runtime/
    format: json
    rotation: never
  - name: archive
    path: archive/
    format: yaml
    rotation: monthly
update_triggers:
  - on_session_end
  - on_explicit_save
archive_policy:
  max_entries: 500
  compress_after: 30d
