name: LiveGate — Real Environment Deployment Check

on:
  pull_request:
    branches: [main, master, staging]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      staging_url:
        description: 'Staging environment URL'
        required: true
        default: 'https://staging.example.com'

env:
  NODE_VERSION: '20'

jobs:
  livegate-check:
    name: Real Environment Probe Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout LiveGate agent
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install LiveGate dependencies
        run: npm ci

      - name: Validate gitagent spec compliance
        run: npx gitagent validate --compliance
        
      - name: Generate git diff for changed files
        id: diff
        run: |
          git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} > /tmp/pr.diff
          echo "diff_lines=$(wc -l < /tmp/pr.diff)" >> $GITHUB_OUTPUT

      - name: Run LiveGate real-environment check
        id: livegate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STAGING_BASE_URL: ${{ github.event.inputs.staging_url || vars.STAGING_BASE_URL || 'http://localhost:3001' }}
          LOG_SOURCE: ${{ vars.LOG_SOURCE || 'file' }}
          LOG_PATH: ${{ vars.LOG_PATH || './demo/sample-logs/access.log' }}
          GITHUB_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node runtime/index.js \
            --diff /tmp/pr.diff \
            --log-source $LOG_SOURCE \
            --log-path $LOG_PATH \
            --staging $STAGING_BASE_URL \
            --repo $GITHUB_REPO \
            --pr $PR_NUMBER
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Read LiveGate verdict
        id: verdict
        if: always()
        run: |
          if [ -f memory/runtime/verdict.json ]; then
            VERDICT=$(cat memory/runtime/verdict.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); const v=JSON.parse(d); console.log(v.verdict)")
            echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
            echo "LiveGate Verdict: $VERDICT"
          else
            echo "verdict=UNKNOWN" >> $GITHUB_OUTPUT
          fi

      - name: Upload LiveGate results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: livegate-results-${{ github.event.pull_request.number }}
          path: memory/runtime/
          retention-days: 30

      - name: Block merge on NO-GO verdict
        if: steps.verdict.outputs.verdict == 'NO-GO'
        run: |
          echo "::error::LiveGate returned NO-GO verdict. Merge blocked."
          exit 1

      - name: Warn on ESCALATE verdict
        if: steps.verdict.outputs.verdict == 'ESCALATE'
        run: |
          echo "::warning::LiveGate returned ESCALATE. Human review required before merging."
