name: github-comment
description: "Post a comment to a GitHub Pull Request. Used by verdict-writer to deliver the deployment verdict directly on the PR."
version: 1.0.0
input_schema:
  type: object
  properties:
    repo:
      type: string
      description: "GitHub repo in format owner/repo"
    pr_number:
      type: integer
      description: "Pull request number"
    body:
      type: string
      description: "Markdown comment body (max 65536 chars)"
    verdict:
      type: string
      enum: ["GO", "NO-GO", "ESCALATE"]
  required: [repo, pr_number, body, verdict]
output_schema:
  type: object
  properties:
    comment_id:
      type: string
    comment_url:
      type: string
    posted_at:
      type: string
annotations:
  requires_confirmation: false
  read_only: false
  cost: low
