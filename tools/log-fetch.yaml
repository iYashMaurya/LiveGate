name: log-fetch
description: "Fetch access logs from a configured source (local file, CloudWatch, or Datadog). Returns raw log lines for the specified time window."
version: 1.0.0
input_schema:
  type: object
  properties:
    source:
      type: string
      enum: ["file", "cloudwatch", "datadog"]
    path_or_arn:
      type: string
      description: "File path for 'file', log group ARN for 'cloudwatch', query for 'datadog'"
    window_hours:
      type: integer
      default: 24
    max_lines:
      type: integer
      default: 100000
  required: [source, path_or_arn]
output_schema:
  type: object
  properties:
    lines_fetched:
      type: integer
    log_lines:
      type: array
      items:
        type: string
    window_start:
      type: string
    window_end:
      type: string
annotations:
  requires_confirmation: false
  read_only: true
  cost: medium
