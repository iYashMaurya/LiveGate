name: http-probe
description: "Fire a single HTTP probe against the staging environment and return the full response signature. Used by env-prober skill."
version: 1.0.0
input_schema:
  type: object
  properties:
    base_url:
      type: string
      description: "Staging base URL"
    method:
      type: string
      enum: ["GET", "POST", "PUT", "PATCH", "DELETE"]
    path:
      type: string
    query_params:
      type: object
    headers:
      type: object
    body:
      type: object
    timeout_ms:
      type: integer
      default: 10000
  required: [base_url, method, path]
output_schema:
  type: object
  properties:
    status_code:
      type: integer
    latency_ms:
      type: number
    response_body_hash:
      type: string
    content_type:
      type: string
    response_size_bytes:
      type: integer
    error:
      type: string
annotations:
  requires_confirmation: false
  read_only: true
  cost: low
