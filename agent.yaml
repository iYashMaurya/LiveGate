spec_version: "0.1.0"
name: livegate
version: 0.1.0
description: "Real-environment CI/CD testing agent that mines production logs to generate live probes against staging — not mocks, not scripts, real signals."
author: "LiveGate"
license: MIT

model:
  preferred: claude-sonnet-4-20250514
  fallback:
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.1
    max_tokens: 1500

skills:
  - diff-reader
  - log-miner
  - probe-generator
  - env-prober
  - behavior-comparator
  - verdict-writer

tools:
  - github-comment
  - http-probe
  - log-fetch

agents:
  probe-executor:
    description: "Executes HTTP probes against real staging environment"
  verdict-auditor:
    description: "Reviews verdicts for correctness before posting"

delegation:
  mode: explicit

runtime:
  max_turns: 30
  timeout: 300

compliance:
  risk_tier: standard
  frameworks: []
  supervision:
    human_in_the_loop: conditional
    escalation_triggers:
      - confidence_below: 0.7
      - error_detected: true
    override_capability: true
    kill_switch: true
  recordkeeping:
    audit_logging: true
    log_format: structured_json
    retention_period: 1y
    log_contents:
      - prompts_and_responses
      - tool_calls
      - decision_pathways
      - model_version
      - timestamps
    immutable: false
  segregation_of_duties:
    roles:
      - id: prober
        description: "Executes probes against the real environment"
        permissions: [execute, submit]
      - id: auditor
        description: "Reviews probe results and writes the verdict"
        permissions: [review, approve, reject, report]
    conflicts:
      - [prober, auditor]
    assignments:
      probe-executor: [prober]
      verdict-auditor: [auditor]
    handoffs:
      - action: deployment_verdict
        required_roles: [prober, auditor]
        approval_required: true
    enforcement: strict

tags:
  - ci-cd
  - real-environment-testing
  - log-mining
  - deployment-intelligence
  - gitagent
  - hackathon
